name: Build & Release

# Trigger: push a version tag like  git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install project dependencies (including dev)
        run: uv sync --all-groups

      - name: Build executable with PyInstaller
        run: |
          New-Item -ItemType Directory -Force -Path job-role-json | Out-Null
          uv run python build_version_info.py
          uv run pyinstaller ResumeGenerator.spec
        shell: pwsh

      - name: Rename artifact with version tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist\ResumeGenerator.exe" "dist\ResumeGenerator-$tag.exe"

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ResumeGenerator-${{ github.ref_name }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
